name: CI/CD Laravel

on:
  push:
    branches: [ master ]
  pull_request: 
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: enrolcm
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: enrolcm
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql, xml, zip, gd, fileinfo, bcmath
          coverage: none

      - name: Installer Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Préparer .env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Vider le cache
        run: php artisan config:clear

      - name: Migrations
        run: php artisan migrate --force

      - name: Tests
        run: php artisan test

  # ─────────────────────────────────────────────
  # JOB 2 — CD : Build Docker + Push sur Docker Hub
  # ─────────────────────────────────────────────
  cd:
    runs-on: ubuntu-latest
    needs: ci
    # ⚠️ "needs: ci" est crucial !
    # Ce job ne démarre QUE si le job "ci" a réussi
    # Si un test échoue → pas de déploiement

    # Ce job ne tourne QUE sur un push sur master (pas sur les pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Permet le cache, les builds multi-architecture, etc.

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            derrickdev/enrolcm:latest
            derrickdev/enrolcm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
