name: CI/CD Laravel

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    # Service MySQL pour les tests (votre projet utilise MySQL)
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: enrolcm
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    # Variables d'environnement partagées par toutes les étapes du job
    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: enrolcm
      DB_USERNAME: root
      DB_PASSWORD: password

    steps:
      # ✅ ÉTAPE 1 — Récupérer le code source depuis GitHub
      - name: Checkout du code
        uses: actions/checkout@v4

      # ✅ ÉTAPE 2 — Installer PHP 8.2 avec les extensions nécessaires
      - name: Installer PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, zip, gd
          # gd est nécessaire pour endroid/qr-code et dompdf

      # ✅ ÉTAPE 3 — Installer les dépendances PHP via Composer
      - name: Installer les dépendances Composer
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
        # --no-interaction   : pas de questions pendant l'install
        # --prefer-dist      : télécharge les archives (plus rapide)
        # --optimize-autoloader : optimise le chargement des classes

      # ✅ ÉTAPE 4 — Créer le fichier .env pour les tests
      - name: Copier le fichier .env
        run: cp .env.example .env
        # GitHub ne dispose pas de votre vrai .env (il est dans .gitignore)
        # On part de .env.example comme base

      # ✅ ÉTAPE 5 — Générer la clé d'application Laravel
      - name: Générer la clé APP_KEY
        run: php artisan key:generate
        # Laravel chiffre sessions et cookies avec cette clé
        # Elle est écrite automatiquement dans le .env

      # ✅ ÉTAPE 6 — Vider le cache de config (pour que Laravel lise bien les env du job)
      - name: Vider le cache de configuration
        run: php artisan config:clear

      # ✅ ÉTAPE 7 — Lancer les migrations
      - name: Lancer les migrations
        run: php artisan migrate --force
        # --force : obligatoire hors environnement local (évite la confirmation interactive)

      # ✅ ÉTAPE 8 — Lancer les tests
      - name: Lancer les tests
        run: php artisan test --parallel --stop-on-failure
        # "php artisan test" est le raccourci Laravel pour PHPUnit
        # --parallel      : lance les tests en parallèle (plus rapide)
        # --stop-on-failure : s'arrête au premier test échoué
        # Si un test échoue → le pipeline s'arrête et GitHub affiche une erreur ❌
        # Si tous passent → pipeline vert ✅

  # ─────────────────────────────────────────────
  # JOB 2 — CD : Build Docker + Push sur Docker Hub
  # ─────────────────────────────────────────────
  cd:
    runs-on: ubuntu-latest
    needs: ci
    # ⚠️ "needs: ci" est crucial !
    # Ce job ne démarre QUE si le job "ci" a réussi
    # Si un test échoue → pas de déploiement

    # Ce job ne tourne QUE sur un push sur main (pas sur les pull requests)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3
        # Permet le cache, les builds multi-architecture, etc.

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/enrolcm:latest
            ${{ secrets.DOCKER_USERNAME }}/enrolcm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
